<!DOCTYPE html>
<!--/* 동적페이지 작성시 생성한 layout 적용 */-->
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{layout/default}">

	<!--/* 적용된 layout 기준으로 추가할 태그를 작성 head 영역 추가시 head태그 작성후 자식노드 삽입 */-->
	<head>
		<meta name="description" content="한국스마트정보교육원"/>
	</head>
	
	<!-- 작성된 layout에 추가할 영역(th:block layout:fragment) 작성후 추가할 자식노드 삽입 -->
	<th:block layout:fragment="contents">
		<div class="content-header">
           <div>
               <h2 class="content-title card-title">거래처관리</h2>
               <p>거래처목록조회</p>
           </div>
       	</div>
        <div class="card mb-4">
	        <header class="card-header">
	            <div class="row gx-3">
	                <div class="col-lg-4 col-md-6 me-auto">
	                    <input type="text" placeholder="Search..." class="form-control" />
	                </div>
	                <div class="col-lg-2 col-6 col-md-3">
	                    <select class="form-select">
	                        <option>Status</option>
	                        <option>Active</option>
	                        <option>Disabled</option>
	                        <option>Show all</option>
	                    </select>
	                </div>
	                <div class="col-lg-2 col-6 col-md-3">
	                    <select class="form-select">
	                        <option>Show 20</option>
	                        <option>Show 30</option>
	                        <option>Show 40</option>
	                    </select>
	                </div>
	            </div>
	        </header>
	        <!-- card-header end// -->
	        <div class="card-body">
	            <div class="table-responsive">
	                <table class="table table-hover text-center">
	                    <thead>
	                        <tr>
	                            <th scope="col">거래처코드</th>
	                            <th scope="col">거래처명</th>
	                            <th scope="col">거래처연락처</th>
	                            <th scope="col">거래처주소</th>
	                            <th scope="col">담당자아이디</th>
	                            <th scope="col">담당자명</th>
	                            <th scope="col">담당자이메일</th>
	                            <th scope="col">상품코드</th>
	                            <th scope="col">상품명</th>
	                            <th scope="col">상품단가</th>
	                        </tr>
	                    </thead>
	                    <tbody>
	                    	<th:block th:if="${not #lists.isEmpty(vendorList)}"
	                        		  th:each="l : ${vendorList}"
	                        		  th:object="${l.memberInfo}">
	                        	<th:block th:if="${not #lists.isEmpty(l.productList)}"
	                        		  	  th:each="pl : ${l.productList}">
		                        	<tr>
		                        		<td th:text="${l.vendorCode}"></td>
		                        		<td th:text="${l.vendorName}"></td>
		                        		<td th:text="${l.vendorTelNo}"></td>
		                        		<td th:text="${l.vendorAddress + ' ' + l.vendorDAddress}"></td>
		                        		<td th:text="${l.vendorMemberId}"></td>
		                        		<td th:text="*{memberName}"></td>
		                        		<td th:text="*{memberEmail}"></td>
		                        		<td th:text="${pl.productCode}"></td>
		                        		<td th:text="${pl.productName}"></td>
		                        		<td th:text="${pl.productUnitPrice}"></td>
		                        	</tr>
	                        	</th:block>
	                        	<th:block th:unless="${not #lists.isEmpty(l.productList)}">
		                        	<tr>
		                        		<td th:text="${l.vendorCode}"></td>
		                        		<td th:text="${l.vendorName}"></td>
		                        		<td th:text="${l.vendorTelNo}"></td>
		                        		<td th:text="${l.vendorAddress + ' ' + l.vendorDAddress}"></td>
		                        		<td th:text="${l.vendorMemberId}"></td>
		                        		<td th:text="*{memberName}"></td>
		                        		<td th:text="*{memberEmail}"></td>
		                        		<td colspan="3">등록된 상품이 없습니다.</td>
		                        	</tr>
	                        	</th:block>
	                    	</th:block>
	                        <tr th:unless="${not #lists.isEmpty(vendorList)}">
	                        	<td colspan="10">등록된 거래처가 없습니다.</td>
	                        </tr>
	                    </tbody>
	                </table>
	            </div>
	            <!-- table-responsive //end -->
	        </div>
	        <!-- card-body end// -->
	    </div>
	    <!-- card end// -->
	</th:block>
	
	
</html>
