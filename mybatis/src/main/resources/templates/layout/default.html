<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<meta charset="UTF-8">
	<title></title>
	<meta http-equiv="x-ua-compatible" content="ie=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<!-- Favicon -->
	<link rel="shortcut icon" type="image/x-icon" th:href="@{/assets/imgs/theme/favicon.svg}" />
	<!-- Template CSS -->
	<link th:href="@{/assets/css/main.css?v=1.1}" rel="stylesheet" type="text/css" />
</head>
<body>
	<div class="screen-overlay"></div>
	<!--/*  
		~{논리파일경로 :: 조각이름}
		: "resources/templates/" + fragments/aside + ".html" :: 파일의 조각이름
	*/-->
	<aside th:replace="~{fragments/aside :: asideFragment}"></aside>
	<main class="main-wrap">
		<header th:replace="~{fragments/header :: headerFragment}"></header>
		
		<!-- custom contents -->
		<section class="content-main">
			
			<!-- 동적페이지 삽입할 공간 지정 -->
			<th:block layout:fragment="contents"></th:block>
			
		</section>
		
		<footer th:replace="~{fragments/footer :: footerFragment}"></footer>
		
	</main>
	<script th:src="@{/assets/js/vendors/jquery-3.6.0.min.js}"></script>
    <script th:src="@{/assets/js/vendors/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/assets/js/vendors/select2.min.js}"></script>
    <script th:src="@{/assets/js/vendors/perfect-scrollbar.js}"></script>
    <script th:src="@{/assets/js/vendors/jquery.fullscreen.min.js}"></script>
    
    <!--/* 개발시 추가할 스크립트 파일 영역 정의 */-->
    <th:block layout:fragment="jsFile"></th:block>
    
    <!-- Main Script -->
    <script th:src="@{/assets/js/main.js}" type="text/javascript"></script>
    
    <!--/* 개발시 추가할 스크립트 코드 영역 정의 */-->
    <th:block layout:fragment="jsScript"></th:block>
</body>
</html>
