<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{layout/default}">
	
	<head>
		<meta name="description" content="한국스마트정보교육원 ksmybatis" />
	</head>
	
	<th:block layout:fragment="jsFile">
		<script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js"></script>
	</th:block>
	
	<th:block layout:fragment="jsScript">
		<script type="text/javascript">
					
			$('#searchPost').click(e => {
				new kakao.Postcode({
		            oncomplete: function(data) {
		                // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

		                // 도로명 주소의 노출 규칙에 따라 주소를 표시한다.
		                // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
		                var roadAddr = data.roadAddress; // 도로명 주소 변수
		                var extraRoadAddr = ''; // 참고 항목 변수

		                // 법정동명이 있을 경우 추가한다. (법정리는 제외)
		                // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
		                if(data.bname !== '' && /[동로가]$/.test(data.bname)){
		                    extraRoadAddr += data.bname;
		                }
		                // 건물명이 있고, 공동주택일 경우 추가한다.
		                if(data.buildingName !== '' && data.apartment === 'Y'){
		                   extraRoadAddr += (extraRoadAddr !== '' ? ', ' + data.buildingName : data.buildingName);
		                }
		                // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
		                if(extraRoadAddr !== ''){
		                    extraRoadAddr = ' (' + extraRoadAddr + ')';
		                }

		                // 우편번호와 주소 정보를 해당 필드에 넣는다.
		                document.getElementById('memberZip').value = data.zonecode;
		                document.getElementById("memberAddress").value = roadAddr;
		                $('#memberDAddress').focus();
		                
		            }
		        }).open();
			});	
			
			// 회원수정
			$('#modifyMemberBtn').click(e => {
				// 태그가 가지고 있는 기본동작 중단
				e.preventDefault();
				
				const memberTelNo1 = $('#memberTelNo1').val();
				const memberTelNo2 = $('#memberTelNo2').val();
				const memberTelNo3 = $('#memberTelNo3').val();
				if(memberTelNo2 && memberTelNo3){
					const memberTelNo = `${memberTelNo1}-${memberTelNo2}-${memberTelNo3}`;
					$('#memberTelNo').val(memberTelNo);
				}
				$('#modifyMemberForm').submit();
				
			});
		</script>
	</th:block>
	
	<!-- 추가할 페이지 contents -->
	<th:block layout:fragment="contents">
		<div class="content-header">
			<div>
				<h2 class="content-title card-title">회원수정</h2>
			</div>
		</div>
        <div class="card mb-4 row col-lg-10">
        	<form id="modifyMemberForm" th:action="@{/member/modifyMember}" method="post">
	            <header class="card-header">
	                <div class="row gx-3 justify-content-end">
	                    <div class="col-lg-2 ms-auto d-flex justify-content-between">
	                        <button type="submit" id="modifyMemberBtn" class="btn btn-success text-white">회원수정</button>
	                        <button type="reset" id="resetBtn" class="btn btn-warning text-white">등록취소</button>
	                    </div>
	                </div>
	            </header>
	            <!-- card-header end// -->
	            <div class="card-body" th:object="${memberInfo}">
	                <div class="row">
	                    <div class="col-md-2">
	                        <h6 class="fs-5">1. 필수입력항목</h6>
	                    </div>
	                    <div class="col-md-10">
	                    	<div class="row">	                    	
		                        <div class="mb-4 col-md-6">
		                            <label class="form-label fs-6 fw-bold">회원아이디</label>
			                        <input type="text" placeholder="아이디를 입력해주세요" class="form-control"
			                        	   id="memberId" name="memberId" th:value="*{memberId}" readonly />
		                        </div>
		                        <div class="mb-4 col-md-6">
		                            <label class="form-label fs-6 fw-bold">회원비밀번호</label>
		                            <input type="text" placeholder="비밀번호를 입력해주세요" class="form-control"
		                            	   id="memberPw" name="memberPw" th:value="*{memberPw}">
		                        </div>
	                    	</div>
	                    	<div class="row">	                    	
		                        <div class="mb-4 col-lg-6">
		                            <label class="form-label fs-6 fw-bold">회원등급</label>
		                            <select class="form-select text-center" id="memberLevel" name="memberGrade">
		                                <option value=""> === 회원등급을 선택해주세요 === </option>
		                                <option th:if="${not #lists.isEmpty(gradeList)}"
		                                		th:each="l : ${gradeList}"
		                                		th:value="${l.commonCode}"
		                                		th:text="${l.commonCodeName}"
		                                		th:selected="${l.commonCode} eq *{memberGrade}">
		                                </option>
		                            </select>
		                        </div>
		                        <div class="mb-4 col-lg-6">
		                            <label class="form-label fs-6 fw-bold">회원이름</label>
		                            <input type="text" placeholder="이름을 입력해주세요" class="form-control"
		                            	   id="memberName" name="memberName" th:value="*{memberName}">
		                        </div>
	                    	</div>
	                    	<div class="row">	                    	
		                        <div class="mb-4 col-lg-6">
		                        	<div class="row align-items-end">
		                        		<div class="col-md-8">		                        		
				                            <label class="form-label fs-6 fw-bold">회원우편번호</label>
					                        <input type="text" placeholder="우편번호를 입력해주세요" class="form-control"
					                        	   id="memberZip" name="memberZip" readonly="readonly" th:value="*{memberZip}"/>
		                        		</div>		                        	
		                        		<div class="col-md-4">
			                            	<button type="button" id="searchPost"
			                            			class="btn btn-info w-100 justify-content-center text-white fw-bold">우편번호찾기</button>
			                            </div>
		                        	</div>
		                        </div>
	                    	</div>
	                    	<div class="row">	                    	
		                        <div class="mb-4 col-lg-6">
		                            <label class="form-label fs-6 fw-bold">회원주소</label>
		                            <input type="text" placeholder="주소를 입력해주세요" class="form-control"
		                            	   id="memberAddress" name="memberAddress" readonly="readonly" th:value="*{memberAddress}"/>
		                        </div>
		                        <div class="mb-4 col-lg-6">
		                            <label class="form-label fs-6 fw-bold">회원상세주소</label>
		                            <input type="text" placeholder="상세주소를 입력해주세요" class="form-control"
		                            	   id="memberDAddress" name="memberDetailAddress" th:value="*{memberDetailAddress}">
		                        </div>
	                    	</div>
	                    	<div class="row">	                    	
		                        <div class="mb-4 col-lg-6">
		                            <div class="row align-items-end">
		                            	<input type="hidden" id="memberTelNo" name="memberTelNo" th:value="*{memberTelNo}"/>
		                        		<div class="col-md-4">		                        		
				                            <label class="form-label fs-6 fw-bold">회원연락처</label>
					                        <select class="form-select text-center" id="memberTelNo1" name="memberTelNum">
				                                <option value="010" th:selected="'010' eq *{memberTelNo1}"> 010 </option>
				                                <option value="063" th:selected="'063' eq *{memberTelNo1}"> 063 </option>
				                            </select>
		                        		</div>		                        	
		                        		<div class="col-md-4">
			                            	<input type="text" placeholder="중간연락처" class="form-control"
			                            		   id="memberTelNo2" name="memberTelNum" th:value="*{memberTelNo2}">
			                            </div>
		                        		<div class="col-md-4">
			                            	<input type="text" placeholder="마지막연락처" class="form-control"
			                            		   id="memberTelNo3" name="memberTelNum" th:value="*{memberTelNo3}">
			                            </div>
		                        	</div>
		                        </div>
		                        <div class="mb-4 col-lg-6">
		                            <label class="form-label fs-6 fw-bold">회원이메일</label>
		                            <input type="text" placeholder="이메일을 입력해주세요" class="form-control"
		                            	   id="memberEmail" name="memberEmail" th:value="*{memberEmail}">
		                        </div>
	                    	</div>
	                    </div> <!-- col.// -->
	                </div>
	            </div>
        	</form>
            <!-- card-body end// -->
        </div>
	</th:block>

</html>
