<!DOCTYPE html>
<!--/* 동적페이지 작성시 생성한 layout 적용 */-->
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{layout/default}">

	<!--/* 적용된 layout 기준으로 추가할 태그를 작성 head 영역 추가시 head태그 작성후 자식노드 삽입 */-->
	<head>
		<meta name="description" content="한국스마트정보교육원"/>
	</head>
	
	<!--/* 개발시 추가할 스크립트 파일 영역 정의 */-->
    <th:block layout:fragment="jsFile">
    	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    	<script src="https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js"></script>
    </th:block>
    
    <!--/* 개발시 추가할 스크립트 코드 영역 정의 */-->
    <th:block layout:fragment="jsScript">
    	<script type="text/javascript">
			$('.del-btn').click( e => {
				// 기본동작 중단
				e.preventDefault();
				Swal.fire({
					title: "회원탈퇴",
					text: "정말로 회원탈퇴하시겠습니까?",
					icon: "warning",
					showCancelButton: true,
					confirmButtonColor: "#3085d6",
					cancelButtonColor: "#d33",
					confirmButtonText: "회원탈퇴",
					cancelButtonText: "탈퇴취소",
				}).then( async (result) => {
					// 탈퇴취소 버튼 클릭시 모달 활성화
					if (result.isDismissed) {
						Swal.fire({
							title: "탈퇴취소",
							icon: "error"
						});
						return ;
					}
					// 회원비밀번호 확인
					const { value: memberPw } = await Swal.fire({
						title: "회원탈퇴",
						input: "password",
						inputLabel: "회원 비밀번호",
						inputPlaceholder: "비밀번호를 입력해주세요",
						inputAttributes: {
							maxlength: "30",
							autocapitalize: "off",
							autocorrect: "off"
						}
					});
					const memberId = $(e.target).data('memberId');
					
					if(!memberId || !memberPw) return ;
					
					const payload = { 
						data : { memberId, memberPw } 
					}
					
					const headers = {
						'headers' : {
							'Content-Type' : 'application/json'
						}
					}
					
					// sweetalert 설정 객체생성
					const sweetConfig = {
						title : '탈퇴실패',
						icon : 'error'
					}
					
					// 회원탈퇴 ajax 요청
					const response = await axios.delete(`/api/member/${memberId}`, payload, headers);
					const isDelete = response.data;
					if(isDelete){
						sweetConfig.title = '탈퇴완료';
						sweetConfig.text = '회원 탈퇴 처리가 완료되었습니다.';
						sweetConfig.icon = 'success';
					}
					
					Swal.fire(sweetConfig).then(result => location.reload());
					
				});
			});
		</script>
    </th:block>
	
	<!-- 작성된 layout에 추가할 영역(th:block layout:fragment) 작성후 추가할 자식노드 삽입 -->
	<th:block layout:fragment="contents">
		<div class="content-header">
           <div>
               <h2 class="content-title card-title">회원관리</h2>
               <p>회원목록조회</p>
           </div>
       	</div>
        <div class="card mb-4">
	        <header class="card-header">
	            <div class="row gx-3">
	                <div class="col-lg-4 col-md-6 me-auto">
	                    <input type="text" placeholder="Search..." class="form-control" />
	                </div>
	                <div class="col-lg-2 col-6 col-md-3">
	                    <select class="form-select">
	                        <option>Status</option>
	                        <option>Active</option>
	                        <option>Disabled</option>
	                        <option>Show all</option>
	                    </select>
	                </div>
	                <div class="col-lg-2 col-6 col-md-3">
	                    <select class="form-select">
	                        <option>Show 20</option>
	                        <option>Show 30</option>
	                        <option>Show 40</option>
	                    </select>
	                </div>
	            </div>
	        </header>
	        <!-- card-header end// -->
	        <div class="card-body">
	            <div class="table-responsive">
	                <table class="table table-hover text-center">
	                    <thead>
	                        <tr>
	                            <th scope="col">회원아이디</th>
	                            <th scope="col">회원비밀번호</th>
	                            <th scope="col">회원이름</th>
	                            <th scope="col">회원등급</th>
	                            <th scope="col">회원주소</th>
	                            <th scope="col">회원우편번호</th>
	                            <th scope="col">회원연락처</th>
	                            <th scope="col">회원이메일</th>
	                            <th scope="col">회원등록일자</th>
	                            <th scope="col">수정</th>
	                            <th scope="col">삭제</th>
	                        </tr>
	                    </thead>
	                    <tbody>
	                        <tr th:if="${not #lists.isEmpty(memberList)}"
	                        	th:each="l : ${memberList}">
	                            <td th:text="${l.memberId}"></td>
	                            <td th:text="${l.memberPw}"></td>
	                            <td th:text="${l.memberName}"></td>
	                            <td th:switch="${l.memberGrade}">
	                            	<span th:case="'mbr_grd_1'" class="badge rounded-pill alert-success">관리자</span>
	                            	<span th:case="'mbr_grd_2'" class="badge rounded-pill alert-warning">판매자</span>
	                            	<span th:case="'mbr_grd_3'" class="badge rounded-pill alert-info">구매자</span>
	                            </td>
	                            <td th:text="${l.memberAddress + ' ' + l.memberDetailAddress}"></td>
	                            <td th:text="${l.memberZip}"></td>
	                            <td th:text="${l.memberTelNo}"></td>
	                            <td th:text="${l.memberEmail}"></td>
	                            <td th:text="${l.memberRegDate}"></td>
	                            <td>
	                            	<a th:href="@{/member/modifyMember(memberId=${l.memberId})}"
	                            	   class="btn btn-sm btn-warning text-white">수정</a>	
	                            </td>
	                            <td>
	                            	<a th:href="@{#}"
	                            	   th:data-member-id="${l.memberId}"
	                            	   class="btn btn-sm btn-danger text-white del-btn">삭제</a>
	                            </td>
	                        </tr>
	                        <tr th:unless="${not #lists.isEmpty(memberList)}">
	                        	<td colspan="11">등록된 회원이 없습니다.</td>
	                        </tr>
	                    </tbody>
	                </table>
	            </div>
	            <!-- table-responsive //end -->
	        </div>
	        <!-- card-body end// -->
	    </div>
	    <!-- card end// -->
	</th:block>
	
	
</html>
